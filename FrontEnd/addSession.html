<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Session</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: radial-gradient(circle at top right, rgba(14,165,233,0.12), transparent 30%),
                  radial-gradient(circle at bottom left, rgba(59,130,246,0.08), transparent 30%),
                  #0b0c12;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .header {
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .header p {
      color: #94a3b8;
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #cbd5e1;
    }

    input, textarea {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    input::placeholder,
    textarea::placeholder {
      color: #6b7280;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(56,189,248,0.6);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .helper {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
    }

    .primary {
      border: none;
      background: linear-gradient(90deg, #1fb6ff, #0ea5e9);
      color: white;
      box-shadow: 0 0 18px rgba(14,165,233,0.25);
    }

    .primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(14,165,233,0.35);
    }

    .secondary {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #cbd5e1;
    }

    .secondary:hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    @media (max-width: 600px) {
      .row {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 24px;
      }

      .header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header">
      <h1>Create New Session</h1>
      <p>Set up your poker game in seconds.</p>
    </div>

    <form>
      <div class="form-group">
        <label>Session Name</label>
        <input type="text" placeholder="e.g. Friday Night Game" required>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" required>
        </div>

        <div class="form-group">
          <label>Time</label>
          <input type="time" required>
        </div>
      </div>

      <div class="form-group">
        <label>Location <span style="color:#94a3b8;">(optional)</span></label>
        <input type="text" placeholder="e.g. Jack's House">
      </div>

      <div class="form-group">
        <label>Notes <span style="color:#94a3b8;">(optional)</span></label>
        <textarea placeholder="Add any notes for this session..."></textarea>
        <div class="helper">
          You can add players and buy-ins after creating the session.
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn secondary">Cancel</button>
        <button type="submit" class="btn primary">Create Session</button>
      </div>
    </form>
  </div>

</body>
</html>
